<style>
/* =============================================================================
   HK TERRASSEMENT — feuille d'heures (fichier unique autonome)
   ============================================================================= */
:root{
  --ink:#17181B; --ink-2:#42444A; --muted:#8C877E; --line:#E7E2DA; --line-2:#D8D2C8;
  --bg:#F4F2ED; --surface:#FFFFFF; --surface-2:#FBFAF7; --header:#141518;
  --accent:#FE6001; --accent-ink:#D65D00; --accent-soft:#FFF2E6;
  --danger:#C0392B; --danger-soft:#F7E9E6; --good:#2F6B3D;
  --radius:14px; --radius-lg:20px; --ease:cubic-bezier(.2,.7,.2,1);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:"Helvetica Neue",Helvetica,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:var(--bg);color:var(--ink);
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;line-height:1.5;
  overflow-x:hidden;                     /* aucun défilement latéral, jamais */
  -webkit-tap-highlight-color:transparent;
  -webkit-text-size-adjust:100%;
}
.wrap{max-width:540px;margin:0 auto;padding:18px 18px calc(72px + env(safe-area-inset-bottom))}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:0 0 12px}
.hint{font-size:12.5px;color:var(--muted);margin-top:12px}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
/* Header */
.topbar{background:var(--surface);color:var(--ink);padding:calc(12px + env(safe-area-inset-top)) 18px 12px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:20;border-bottom:1px solid var(--line)}
.topbar::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--accent)}
.topbar .brand{height:46px;display:block}
.topbar svg.brand{height:46px}
.topbar .who{margin-left:auto;text-align:right;line-height:1.2}
.topbar .who .nom{font-weight:700;font-size:15px;letter-spacing:.01em}
.topbar .who .role{font-size:10.5px;color:var(--accent-ink);text-transform:uppercase;letter-spacing:.12em;font-weight:700;margin-top:2px}
/* Splash (style Alsace Epandage) */
#splash{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;background:#fff;animation:splashOut .55s ease 1.7s forwards}
#splash .s-logo{width:76%;max-width:300px;height:auto;animation:splashMark .7s cubic-bezier(.2,.85,.25,1) both}
#splash .s-bar{width:132px;height:3px;border-radius:3px;background:rgba(254,96,1,.16);overflow:hidden}
#splash .s-bar::after{content:"";display:block;height:100%;width:45%;border-radius:3px;background:var(--accent);animation:splashBar 1.45s ease .3s both}
@keyframes splashMark{0%{opacity:0;transform:scale(.7) translateY(10px)}60%{opacity:1}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes splashBar{0%{transform:translateX(-115%)}100%{transform:translateX(330%)}}
@keyframes splashOut{to{opacity:0;visibility:hidden;pointer-events:none}}
@media (prefers-reduced-motion:reduce){#splash{animation-delay:.8s}#splash .s-logo,#splash .s-bar::after{animation:none}}
/* Onglets */
.tabs{display:flex;gap:4px;background:var(--surface-2);border:1px solid var(--line);border-radius:999px;padding:4px;margin-top:20px}
.tab{flex:1;display:flex;align-items:center;justify-content:center;min-height:44px;border:none;background:transparent;font:inherit;font-weight:600;font-size:14px;color:var(--muted);padding:10px 12px;border-radius:999px;cursor:pointer;transition:.15s var(--ease)}
.tab[aria-selected="true"]{background:var(--surface);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.09)}
/* Récap semaine */
.wk-head{display:flex;align-items:baseline;justify-content:space-between;margin-top:22px}
.wk-head .t{font-size:19px;font-weight:700}
.wk-head .s{font-size:12.5px;color:var(--muted)}
.wk-row{display:flex;align-items:center;gap:12px;padding:15px 2px;border-bottom:1px solid var(--line)}
.wk-row:last-child{border-bottom:none}
.wk-row .rail{width:4px;align-self:stretch;border-radius:3px;background:var(--line-2)}
.wk-row.work .rail{background:var(--accent)}
.wk-row.off .rail{background:var(--danger)}
.wk-row.empty .rail{background:var(--line-2)}
.wk-day{font-weight:700;font-size:15px;text-transform:capitalize}
.wk-sub{font-size:12px;color:var(--muted);margin-top:2px}
.wk-val{margin-left:auto;text-align:right;font-variant-numeric:tabular-nums;font-weight:700;font-size:16px}
.wk-val.off{color:var(--danger);font-size:13px;text-transform:uppercase;letter-spacing:.04em}
.wk-val.empty{color:var(--muted);font-weight:500}
/* Panels */
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);padding:20px;margin-top:14px}
.panel + .panel{margin-top:12px}
/* Barre de date */
.daybar{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-top:22px}
.daybar>div{min-width:0}
.daybar .day{overflow-wrap:anywhere}
.daybar .day{font-size:30px;font-weight:700;letter-spacing:-.01em;text-transform:capitalize;line-height:1.05}
.daybar .day-sub{font-size:13px;color:var(--muted);margin-top:4px}
.date-input{flex:0 0 auto;min-width:0;max-width:52%;box-sizing:border-box;-webkit-appearance:none;appearance:none;font:inherit;font-size:14px;color:var(--ink);border:1px solid var(--line-2);border-radius:12px;padding:11px 12px;background:var(--surface);font-variant-numeric:tabular-nums}
/* Pastilles type de journée */
.seg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.seg>*{min-width:0}
.pill{display:flex;align-items:center;justify-content:flex-start;gap:9px;min-height:46px;border:1px solid var(--line-2);background:var(--surface-2);color:var(--ink-2);border-radius:999px;padding:11px 16px;font-size:14.5px;font-weight:600;cursor:pointer;transition:all .15s var(--ease)}
.pill .dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex:0 0 auto;transition:.15s var(--ease)}
.pill span:last-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill.work .dot{background:var(--accent)}
.pill.off .dot{background:var(--danger)}
.pill:hover{border-color:var(--line-2);background:#fff}
.pill[aria-pressed="true"]{background:#fff;color:var(--ink);border-color:var(--ink)}
.pill.work[aria-pressed="true"]{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}
.pill.off[aria-pressed="true"]{border-color:var(--danger);box-shadow:inset 0 0 0 1px var(--danger);background:var(--danger-soft);color:var(--danger)}
/* Champs */
.field{display:block}
.field .lab{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:7px;letter-spacing:.01em}
.in,input[type=time].in,input[type=text].in,textarea.in{width:100%;min-width:0;max-width:100%;box-sizing:border-box;-webkit-appearance:none;appearance:none;font:inherit;font-size:16px;color:var(--ink);padding:13px 14px;border:1px solid var(--line-2);border-radius:12px;background:var(--surface-2);transition:border-color .15s var(--ease),box-shadow .15s var(--ease)}
input[type=time].in{font-variant-numeric:tabular-nums;letter-spacing:.02em}
.in:focus,textarea.in:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);background:#fff}
textarea.in{font-size:15px;min-height:72px;resize:none}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.two>*{min-width:0}                 /* clé : autorise la colonne à rétrécir (sinon les champs heure iOS débordent) */
.mt{margin-top:18px}
.quick{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.quick button{display:inline-flex;align-items:center;min-height:44px;border:1px solid var(--line-2);background:var(--surface-2);color:var(--ink-2);font:inherit;font-weight:600;font-size:13px;border-radius:999px;padding:0 16px;cursor:pointer;transition:.15s var(--ease)}
.quick button:hover{border-color:var(--ink);color:var(--ink);background:#fff}
.quick button.primary{border-color:var(--accent);color:var(--accent-ink);background:var(--accent-soft)}
/* Bandeau absence */
.banner{border:1px solid var(--danger);background:var(--danger-soft);color:var(--danger);border-radius:14px;padding:16px 18px;font-weight:700;font-size:15px;letter-spacing:.02em;display:flex;align-items:center;gap:12px}
.banner .mk{width:9px;height:9px;border-radius:50%;background:var(--danger);flex:0 0 auto}
/* Registre (totaux) */
.ledger{background:var(--header);color:#fff;border-radius:var(--radius-lg);padding:18px 22px;margin-top:16px}
.ledger-row{display:flex;align-items:baseline;justify-content:space-between;padding:7px 0}
.ledger-row.total{border-bottom:1px solid rgba(255,255,255,.12);padding-bottom:14px}
.ledger-row .k{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#A9A49B}
.ledger-row.total .k{color:#D8D3CB;font-weight:600}
.ledger .big{font-size:40px;font-weight:800;line-height:1;color:var(--accent);font-variant-numeric:tabular-nums}
.ledger .big .u{font-size:18px;font-weight:700;color:#fff;margin-left:3px}
.ledger-row.sub{padding:5px 0}
.ledger-row.sub .k{color:#8B867E}
.ledger-row.sub .v{font-size:15px;color:#EDEAE4;font-variant-numeric:tabular-nums}
/* Bouton envoyer */
.btn-send{width:100%;margin-top:16px;border:none;border-radius:14px;background:var(--accent);color:#fff;font:inherit;font-size:15px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:17px;cursor:pointer;transition:.15s var(--ease)}
.btn-send:hover{background:#E56200}
.btn-send:active{transform:translateY(1px)}
.btn-send:disabled{background:#CFC9C0;color:#fff;cursor:not-allowed}
/* Confirmation */
.done{text-align:center;padding:14px 4px 6px}
.done .tick{width:52px;height:52px;margin:0 auto 12px;border-radius:50%;background:var(--accent-soft);color:var(--accent-ink);display:flex;align-items:center;justify-content:center}
.done .tick svg{width:26px;height:26px}
.done h3{margin:2px 0 6px;font-size:20px;font-weight:700}
.done p{color:var(--muted);margin:3px 0;font-size:14px}
.done .strong{color:var(--ink);font-weight:700}
.link{display:inline-block;margin-top:16px;color:var(--accent-ink);font-weight:600;text-decoration:none;font-size:14px;border-bottom:1px solid var(--accent-soft);padding-bottom:1px}
.link:hover{border-color:var(--accent)}
/* Onboarding */
.toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.toggle button{border:1px solid var(--line-2);background:var(--surface-2);color:var(--ink-2);font:inherit;font-weight:600;font-size:15px;border-radius:12px;padding:14px;cursor:pointer;transition:.15s var(--ease)}
.toggle button[aria-pressed="true"]{background:#fff;color:var(--ink);border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}
/* Divers */
.foot{text-align:center;color:var(--muted);font-size:12.5px;margin-top:20px}
.foot a{display:inline-block;min-height:44px;line-height:44px;padding:0 10px;color:var(--accent-ink);text-decoration:none;font-weight:600}
.hide{display:none!important}
.notif-cta{max-width:540px;margin:0 auto;padding:0 18px}
.notif-cta:empty{display:none}
.notif-cta-btn{width:100%;margin-top:14px;border:1px solid var(--accent);background:var(--accent-soft);color:var(--accent-ink);font:inherit;font-weight:700;font-size:14px;border-radius:12px;padding:13px;cursor:pointer}
.notif-cta-btn:active{transform:translateY(1px)}
.notif-cta-btn:disabled{opacity:.6}
.notif-diag{font-size:10.5px;color:var(--muted);text-align:center;margin-top:6px;font-variant-numeric:tabular-nums;letter-spacing:.02em}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:14px 22px;border-radius:12px;font-weight:600;font-size:14px;box-shadow:0 12px 30px rgba(0,0,0,.22);z-index:50;max-width:90%;text-align:center}
.toast.err{background:var(--danger)}
</style>
<!-- Notifications push — Web Push VAPID standard (aucun SDK tiers) -->
<script>
  var HK_VERSION = "v12";
  var HK_DEBUG = /[?&]debug=1/.test(location.search);   // diagnostic masqué en production
  var HK_VAPID_PUBLIC = "BEx3Fw-lSV6EB3_8PvyiKgQxwyP5xia-vP4kbB33QDHQAO0xZmEt9oTVaMERHOExwblth_T7j2MS7aMQMuYmzBM";
  var HK_SUB_WEBHOOK = "https://hook.eu1.make.com/s9escvs6afqaajdp5q5jc4rd8rkkh43f";
  var HK_SCOPE = "/HK-feuille-d-heure-/";

  function hkB64ToUint8(b64){
    var pad = "=".repeat((4 - b64.length % 4) % 4);
    var s = (b64 + pad).replace(/-/g, "+").replace(/_/g, "/");
    var raw = atob(s), arr = new Uint8Array(raw.length);
    for (var i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
    return arr;
  }

  window.HK_NOTIF = {
    employe: null,
    login: function(emp){ HK_NOTIF.employe = emp; HK_NOTIF.refreshCta(); HK_NOTIF.sync(); },
    markDone: function(){ /* le journal des envois est géré côté Make */ },

    // Renvoie l'abonnement à chaque ouverture (garde le Data Store à jour ;
    // les abonnements push peuvent être révoqués/renouvelés par le navigateur)
    sync: async function(){
      try{
        if (!HK_NOTIF.employe || Notification.permission !== "granted") return;
        var reg = await navigator.serviceWorker.getRegistration(HK_SCOPE);
        if (!reg) return;
        var sub = await reg.pushManager.getSubscription();
        if (!sub) return;
        await fetch(HK_SUB_WEBHOOK, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            employeId:  HK_NOTIF.employe.id,
            employeNom: HK_NOTIF.employe.nom,
            subscription: sub
          })
        });
      }catch(e){}
    },

    // L'activation DOIT partir d'un vrai tap (exigence iOS)
    activer: async function(btn){
      try{
        if (btn){ btn.disabled = true; btn.textContent = "Activation…"; }
        var perm = await Notification.requestPermission();
        if (perm !== "granted"){ HK_NOTIF.refreshCta(); return; }
        var reg = await navigator.serviceWorker.register(HK_SCOPE + "sw.js", { scope: HK_SCOPE });
        await navigator.serviceWorker.ready;
        var sub = await reg.pushManager.getSubscription();
        if (!sub){
          sub = await reg.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: hkB64ToUint8(HK_VAPID_PUBLIC)
          });
        }
        if (sub && HK_SUB_WEBHOOK){
          await fetch(HK_SUB_WEBHOOK, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              employeId:  HK_NOTIF.employe ? HK_NOTIF.employe.id  : "",
              employeNom: HK_NOTIF.employe ? HK_NOTIF.employe.nom : "",
              subscription: sub
            })
          });
        }
      } catch(e){ if (btn) btn.textContent = "Erreur : " + (e && e.message ? e.message : e); }
      HK_NOTIF.refreshCta();
    },

    refreshCta: async function(){
      var el = document.getElementById("notif-cta"); if (!el) return;
      var supporte = ("PushManager" in window) ? "ok" : "NON";
      var installe = "?", perm = "?", sw = "0";
      try{ installe = ((window.matchMedia && matchMedia("(display-mode: standalone)").matches) || navigator.standalone === true) ? "oui" : "NON"; }catch(e){}
      try{ perm = (typeof Notification !== "undefined") ? Notification.permission : "n/a"; }catch(e){}
      try{ var rs = await navigator.serviceWorker.getRegistrations(); sw = String(rs.length); }catch(e){}
      var sub = null;
      try{
        var reg = await navigator.serviceWorker.getRegistration(HK_SCOPE);
        if (reg) sub = await reg.pushManager.getSubscription();
      }catch(e){}
      var abonne = !!(sub && perm === "granted");
      el.innerHTML =
        (abonne ? "" : '<button type="button" id="notif-btn" class="notif-cta-btn">🔔 Activer les rappels de 18h30</button>') +
        (HK_DEBUG ? '<div class="notif-diag">push:' + supporte + ' · installé:' + installe + ' · perm:' + perm +
          ' · sw:' + sw + ' · <b>token:' + (sub ? "OUI" : "non") + '</b> · ' + HK_VERSION + '</div>' : "");
      var b = document.getElementById("notif-btn");
      if (b) b.addEventListener("click", function(){ HK_NOTIF.activer(b); });
    }
  };
</script>

<script>
/* =============================================================================
   ⚙️  CONFIG — SEULE PARTIE À MODIFIER
   -----------------------------------------------------------------------------
   1) Collez l'URL de votre webhook (Make.com ou Apps Script /exec) ci-dessous.
   2) (Optionnel) Remplissez HK_EMPLOYES pour un menu déroulant de noms.
   ============================================================================= */
window.HK_CONFIG = {
  webhookUrl: "https://hook.eu1.make.com/qjruii1ushxp5utol2wf6xpzauc4l1dj",
  timezone: "Europe/Paris",
  heuresAttendues: { lundi:8, mardi:8, mercredi:8, jeudi:8, vendredi:7, samedi:0, dimanche:0 },
  heuresPayeesMois: 169,
  journeeStandard: {
    semaine:  { matineeDebut:"08:00", matineeFin:"12:00", apremDebut:"13:00", apremFin:"17:00" },
    vendredi: { matineeDebut:"08:00", matineeFin:"12:00", apremDebut:"13:00", apremFin:"16:00" }
  }
};
window.HK_EMPLOYES = [
  // { id:"jean-dupont", nom:"Jean Dupont", role:"chantier" },
  // { id:"paul-martin", nom:"Paul Martin", role:"chauffeur" },
];

/* =============================================================================
   APPLICATION (ne rien modifier ci-dessous)
   ============================================================================= */
(function () {
  "use strict";
  const CFG = window.HK_CONFIG || {};
  const EMPLOYES = window.HK_EMPLOYES || [];
  const JOURS = ["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"];
  const STATUTS = [
    { id:"travail",  label:"Travaillé", cat:"work" },
    { id:"conge",    label:"Congé",     cat:"off"  },
    { id:"absence",  label:"Absence",   cat:"off"  },
    { id:"repos",    label:"Repos",     cat:"off"  },
    { id:"vacances", label:"Vacances",  cat:"off"  },
    { id:"maladie",  label:"Maladie",   cat:"off"  }
  ];
  const STATUTS_SPECIAUX = ["conge","absence","repos","vacances","maladie"];
  const CLE_IDENTITE = "hk_identite";
  const TICK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';

  const app = document.getElementById("app");
  const who = document.getElementById("who");

  (function(){
    const s = document.getElementById("splash");
    if (!s) return;
    setTimeout(()=>{ if(s.parentNode) s.remove(); }, 2500);
  })();

  function slug(s){
    return s.toString().toLowerCase().trim().normalize("NFD").replace(/[̀-ͯ]/g,"")
      .replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"");
  }
  function identiteURL(){
    const p = new URLSearchParams(location.search);
    const id = p.get("id") || (location.hash ? decodeURIComponent(location.hash.replace(/^#/,"")) : "");
    if (!id) return null;
    const e = EMPLOYES.find(x => x.id === id);
    return e ? { id:e.id, nom:e.nom, role:e.role } : null;
  }
  function identiteSauvee(){ try { return JSON.parse(localStorage.getItem(CLE_IDENTITE)); } catch(e){ return null; } }
  function sauverIdentite(idt){ localStorage.setItem(CLE_IDENTITE, JSON.stringify(idt)); }

  let employe = identiteURL() || identiteSauvee();
  if (employe && identiteURL()) sauverIdentite(employe);

  function renderOnboarding(){
    if (who) who.innerHTML = "";
    const options = EMPLOYES.map(e => `<option value="${e.id}">${e.nom}</option>`).join("");
    app.innerHTML = `
      <div class="panel" style="margin-top:26px">
        <div class="eyebrow">Feuille d'heures</div>
        ${EMPLOYES.length ? `
        <div class="field mt">
          <span class="lab">Je suis</span>
          <select class="in" id="ob-liste">
            <option value="">Choisir mon nom</option>${options}
            <option value="__autre">Autre…</option>
          </select>
        </div>` : ""}
        <div id="ob-manuel" class="${EMPLOYES.length ? "hide" : ""}">
          <div class="field ${EMPLOYES.length ? "mt" : ""}">
            <span class="lab">Nom et prénom</span>
            <input type="text" class="in" id="ob-nom" placeholder="Nom et prénom" autocomplete="name">
          </div>
          <div class="field mt">
            <span class="lab">Poste</span>
            <div class="toggle">
              <button type="button" id="ob-chantier" aria-pressed="true">Chantier</button>
              <button type="button" id="ob-chauffeur" aria-pressed="false">Chauffeur</button>
            </div>
          </div>
        </div>
        <button class="btn-send" id="ob-ok" style="margin-top:22px">Continuer</button>
        <div class="hint" style="text-align:center">Mémorisé sur cet appareil</div>
      </div>`;

    let role = "chantier";
    const manuel = document.getElementById("ob-manuel");
    const liste = document.getElementById("ob-liste");
    const bC = document.getElementById("ob-chantier");
    const bK = document.getElementById("ob-chauffeur");
    bC.addEventListener("click", ()=>{ role="chantier"; bC.setAttribute("aria-pressed","true"); bK.setAttribute("aria-pressed","false"); });
    bK.addEventListener("click", ()=>{ role="chauffeur"; bK.setAttribute("aria-pressed","true"); bC.setAttribute("aria-pressed","false"); });
    if (liste) liste.addEventListener("change", e=>{ manuel.classList.toggle("hide", e.target.value !== "__autre"); });

    document.getElementById("ob-ok").addEventListener("click", ()=>{
      if (liste && liste.value && liste.value !== "__autre"){
        const e = EMPLOYES.find(x=>x.id===liste.value);
        employe = { id:e.id, nom:e.nom, role:e.role };
      } else {
        const nom = (document.getElementById("ob-nom").value || "").trim();
        if (nom.length < 2) return toast("Saisissez votre nom.", true);
        employe = { id:slug(nom), nom:nom, role:role };
      }
      sauverIdentite(employe); demarrer();
    });
  }

  function todayISO(){ const d=new Date(),off=d.getTimezoneOffset()*60000; return new Date(d-off).toISOString().slice(0,10); }
  function jourNom(iso){ return JOURS[new Date(iso+"T12:00:00").getDay()]; }
  function jourFrLong(iso){ return new Date(iso+"T12:00:00").toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"}); }
  function dureeH(a,b){ if(!a||!b) return 0; const[ha,ma]=a.split(":").map(Number),[hb,mb]=b.split(":").map(Number);
    const d=((hb*60+mb)-(ha*60+ma))/60; return d>0?d:0; }
  function heuresAttenduesJour(iso){ const j=jourNom(iso); return (CFG.heuresAttendues&&CFG.heuresAttendues[j]!=null)?CFG.heuresAttendues[j]:8; }
  function fmtH(h){ const s=Math.round(h*100)/100; return (Number.isInteger(s)?s:s.toFixed(2).replace(/0$/,"")); }
  function fmtHU(h){ return fmtH(h)+" h"; }
  function fmtHM(h){ if(h<=0) return "0 h"; const t=Math.round(h*60),hh=Math.floor(t/60),mm=t%60; return hh+" h"+(mm?(" "+String(mm).padStart(2,"0")):""); }
  const sentKey = iso => "hk_sent_"+employe.id+"_"+iso;

  // Ligne cible dans le modèle Excel : 5 blocs de 5 jours (Lun→Ven),
  // débuts lignes 2/13/24/35/46. Samedi/dimanche non gérés (="").
  function ligneModele(iso){
    const d = new Date(iso+"T12:00:00");
    const wd = (d.getDay()+6)%7;                    // Lun=0 … Dim=6
    if (wd > 4) return "";                           // week-end : hors modèle
    const first = new Date(d.getFullYear(), d.getMonth(), 1);
    const firstWd = (first.getDay()+6)%7;
    const mondayFirst = new Date(first); mondayFirst.setDate(1 - firstWd);
    const monday = new Date(d); monday.setDate(d.getDate() - wd);
    const bloc = Math.round((monday - mondayFirst)/(7*86400000));
    const debuts = [2,13,24,35,46];
    return (bloc>=0 && bloc<=4) ? (debuts[bloc] + wd) : "";
  }

  let estChauffeur, state, vue = "jour";
  function initState(){
    estChauffeur = employe.role === "chauffeur";
    state = { date:todayISO(), statut:"travail", chantier:"", trajetAllerDep:"", trajetAllerArr:"",
      matineeDebut:"", matineeFin:"", apremDebut:"", apremFin:"", trajetRetourDep:"", trajetRetourArr:"", commentaire:"" };
  }
  function heuresJournee(){ if(state.statut!=="travail") return 0; return dureeH(state.matineeDebut,state.matineeFin)+dureeH(state.apremDebut,state.apremFin); }
  function heuresTrajet(){ if(state.statut!=="travail"||estChauffeur) return 0; return dureeH(state.trajetAllerDep,state.trajetAllerArr)+dureeH(state.trajetRetourDep,state.trajetRetourArr); }
  function pauseMidi(){ return dureeH(state.matineeFin,state.apremDebut); }

  function renderNav(){
    return `<div class="tabs">
      <button class="tab" data-vue="jour" aria-selected="${vue==='jour'}">Ma journée</button>
      <button class="tab" data-vue="semaine" aria-selected="${vue==='semaine'}">Ma semaine</button>
    </div>`;
  }
  function bindShell(){
    document.querySelectorAll(".tab[data-vue]").forEach(b=>b.addEventListener("click",()=>{ vue=b.dataset.vue; render(); }));
    const sw=document.getElementById("f-switch"); if(sw) sw.addEventListener("click",switchUser);
  }
  function render(){
    if(vue==="semaine"){ app.innerHTML = renderNav()+semaineView(); bindShell(); return; }
    const deja = localStorage.getItem(sentKey(state.date));
    if(deja){ app.innerHTML = renderNav()+doneView(JSON.parse(deja)); bindShell(); bindDone(); return; }
    app.innerHTML = renderNav()+dayView(); bindShell(); bind();
  }
  function dayView(){
    const special = STATUTS_SPECIAUX.includes(state.statut);
    return `
      <div class="daybar">
        <div>
          <div class="eyebrow" style="margin-bottom:6px">Journée</div>
          <div class="day">${jourNom(state.date)}</div>
          <div class="day-sub">${jourFrLong(state.date)}</div>
        </div>
        <input type="date" class="date-input" id="f-date" value="${state.date}" max="${todayISO()}">
      </div>

      <div class="panel">
        <div class="eyebrow">Type de journée</div>
        <div class="seg">
          ${STATUTS.map(s=>`<button class="pill ${s.cat}" data-statut="${s.id}" aria-pressed="${state.statut===s.id}">
            <span class="dot"></span><span>${s.label}</span></button>`).join("")}
        </div>
      </div>

      ${special ? renderBanner() : renderTravail()}

      <button class="btn-send" id="f-send">Envoyer</button>
      <div class="foot">${employe.nom} · <a href="#" id="f-switch">changer</a></div>`;
  }

  function renderBanner(){
    const s=STATUTS.find(x=>x.id===state.statut);
    return `<div class="panel">
      <div class="banner"><span class="mk"></span>Journée déclarée : ${s.label.toUpperCase()}</div>
      <div class="field mt"><span class="lab">Commentaire (facultatif)</span>
      <textarea class="in" id="f-com" placeholder="Précision éventuelle">${state.commentaire}</textarea></div></div>`;
  }

  function paire(lD,iD,vD,lF,iF,vF){
    return `<div class="two">
      <div class="field"><span class="lab">${lD}</span><input type="time" class="in" id="${iD}" value="${vD}"></div>
      <div class="field"><span class="lab">${lF}</span><input type="time" class="in" id="${iF}" value="${vF}"></div></div>`;
  }

  function renderTravail(){
    const attendu=heuresAttenduesJour(state.date), hj=heuresJournee(), ht=heuresTrajet(), pm=pauseMidi();
    return `
      <div class="panel">
        <div class="eyebrow">Chantier</div>
        <input type="text" class="in" id="f-chantier" placeholder="Nom du chantier" value="${state.chantier}">
        <div class="quick">
          <button class="primary" id="q-standard">Journée standard · ${attendu} h</button>
          <button id="q-clear">Effacer</button></div>
      </div>
      ${estChauffeur?"":`<div class="panel"><div class="eyebrow">Trajet aller</div>
        ${paire("Départ","f-tad",state.trajetAllerDep,"Arrivée","f-taa",state.trajetAllerArr)}</div>`}
      <div class="panel">
        <div class="eyebrow">Matinée</div>${paire("Début","f-md",state.matineeDebut,"Fin","f-mf",state.matineeFin)}
        <div class="eyebrow mt">Après-midi</div>${paire("Début","f-ad",state.apremDebut,"Fin","f-af",state.apremFin)}
        <div class="hint">Pause de midi&nbsp;: <b id="r-pause" style="color:var(--ink-2)">${fmtHM(pm)}</b></div>
      </div>
      ${estChauffeur?"":`<div class="panel"><div class="eyebrow">Trajet retour</div>
        ${paire("Départ","f-trd",state.trajetRetourDep,"Arrivée","f-tra",state.trajetRetourArr)}</div>`}
      <div class="panel"><div class="field"><span class="lab">Commentaire (facultatif)</span>
        <textarea class="in" id="f-com" placeholder="Remarque">${state.commentaire}</textarea></div></div>

      <div class="ledger">
        <div class="ledger-row total">
          <span class="k">Total journée</span>
          <span class="big num" id="r-journee">${fmtH(hj)}<span class="u">h</span></span>
        </div>
        <div class="ledger-row sub"><span class="k">Attendu</span><span class="v">${attendu} h</span></div>
        ${estChauffeur?"":`<div class="ledger-row sub"><span class="k">Trajet</span><span class="v" id="r-trajet">${fmtHU(ht)}</span></div>`}
      </div>`;
  }

  function doneView(payload){
    return `
      <div class="panel" style="margin-top:16px"><div class="done">
        <div class="tick">${TICK}</div>
        <h3>Feuille envoyée</h3>
        <p>${jourFrLong(state.date)}</p>
        <p>Envoyée à <span class="strong">${payload._envoyeHeure||"—"}</span></p>
        ${payload.statut==="travail"
          ? `<p><span class="strong">${fmtHU(payload.heuresJournee)}</span> de travail${payload.heuresTrajet?` · ${fmtHU(payload.heuresTrajet)} trajet`:""}</p>`
          : `<p><span class="strong" style="color:var(--danger)">${payload.statutLabel}</span></p>`}
        <a class="link" id="f-autre" href="#">Remplir un autre jour</a>
      </div></div>
      <div class="foot">${employe.nom} · <a href="#" id="f-switch">changer</a></div>`;
  }
  function bindDone(){
    document.getElementById("f-autre").addEventListener("click", e=>{ e.preventDefault();
      const d=prompt("Date à remplir (AAAA-MM-JJ) :", todayISO());
      if(d && /^\d{4}-\d{2}-\d{2}$/.test(d)){ state.date=d; render(); }});
  }

  function isoOf(d){ const off=d.getTimezoneOffset()*60000; return new Date(d-off).toISOString().slice(0,10); }
  function weekMonday(iso){ const d=new Date(iso+"T12:00:00"),dow=(d.getDay()+6)%7; d.setDate(d.getDate()-dow); return isoOf(d); }
  function addDays(iso,n){ const d=new Date(iso+"T12:00:00"); d.setDate(d.getDate()+n); return isoOf(d); }
  function fmtJourCourt(iso){ return new Date(iso+"T12:00:00").toLocaleDateString("fr-FR",{day:"numeric",month:"short"}); }

  function semaineView(){
    const monday=weekMonday(todayISO()), auj=todayISO();
    let totalTrav=0, totalTrajet=0, attenduTot=0, rows="";
    for(let i=0;i<7;i++){
      const iso=addDays(monday,i), jn=JOURS[new Date(iso+"T12:00:00").getDay()], att=heuresAttenduesJour(iso);
      const raw=localStorage.getItem(sentKey(iso)), entry=raw?JSON.parse(raw):null;
      if(i===6 && !entry) continue;
      attenduTot+=att;
      let cls,val,sub="";
      if(entry){
        if(entry.statut==="travail"){ cls="work"; totalTrav+=entry.heuresJournee||0; totalTrajet+=entry.heuresTrajet||0;
          val=`<span class="wk-val">${fmtHU(entry.heuresJournee||0)}</span>`;
          sub=entry.chantier?`<div class="wk-sub">${entry.chantier}</div>`
             :(entry.heuresTrajet?`<div class="wk-sub">trajet ${fmtHU(entry.heuresTrajet)}</div>`:"");
        } else { cls="off"; val=`<span class="wk-val off">${entry.statutLabel}</span>`; }
      } else { cls="empty"; val=`<span class="wk-val empty">—</span>`;
        sub = iso<=auj ? `<div class="wk-sub">à remplir</div>` : ""; }
      rows+=`<div class="wk-row ${cls}"><span class="rail"></span>
        <div><div class="wk-day">${jn}</div>${sub}</div>${val}</div>`;
    }
    return `
      <div class="wk-head"><div><div class="t">Ma semaine</div>
        <div class="s">du ${fmtJourCourt(monday)} au ${fmtJourCourt(addDays(monday,5))}</div></div></div>
      <div class="panel">${rows}</div>
      <div class="ledger">
        <div class="ledger-row total"><span class="k">Total semaine</span>
          <span class="big num">${fmtH(totalTrav)}<span class="u">h</span></span></div>
        <div class="ledger-row sub"><span class="k">Attendu</span><span class="v">${attenduTot} h</span></div>
        ${totalTrajet?`<div class="ledger-row sub"><span class="k">Trajet</span><span class="v">${fmtHU(totalTrajet)}</span></div>`:""}
      </div>
      <div class="foot">${employe.nom} · <a href="#" id="f-switch">changer</a></div>`;
  }

  function bind(){
    document.getElementById("f-date").addEventListener("change", e=>{ state.date=e.target.value||todayISO(); render(); });
    document.querySelectorAll(".pill[data-statut]").forEach(b=>b.addEventListener("click",()=>{ state.statut=b.dataset.statut; render(); }));
    const map=[["f-chantier","chantier"],["f-tad","trajetAllerDep"],["f-taa","trajetAllerArr"],["f-md","matineeDebut"],
      ["f-mf","matineeFin"],["f-ad","apremDebut"],["f-af","apremFin"],["f-trd","trajetRetourDep"],["f-tra","trajetRetourArr"],["f-com","commentaire"]];
    map.forEach(([id,key])=>{ const el=document.getElementById(id); if(el) el.addEventListener("input",e=>{ state[key]=e.target.value; refreshRecap(); }); });
    const qs=document.getElementById("q-standard"), qc=document.getElementById("q-clear");
    if(qs) qs.addEventListener("click",()=>{ const std=jourNom(state.date)==="vendredi"?CFG.journeeStandard.vendredi:CFG.journeeStandard.semaine;
      Object.assign(state,{matineeDebut:std.matineeDebut,matineeFin:std.matineeFin,apremDebut:std.apremDebut,apremFin:std.apremFin}); render(); });
    if(qc) qc.addEventListener("click",()=>{ Object.assign(state,{trajetAllerDep:"",trajetAllerArr:"",matineeDebut:"",matineeFin:"",
      apremDebut:"",apremFin:"",trajetRetourDep:"",trajetRetourArr:""}); render(); });
    document.getElementById("f-send").addEventListener("click", envoyer);
  }
  function refreshRecap(){
    const j=document.getElementById("r-journee"); if(j) j.innerHTML=fmtH(heuresJournee())+'<span class="u">h</span>';
    const t=document.getElementById("r-trajet"); if(t) t.textContent=fmtHU(heuresTrajet());
    const p=document.getElementById("r-pause"); if(p) p.textContent=fmtHM(pauseMidi());
  }
  function switchUser(e){ if(e) e.preventDefault();
    if(confirm("Changer d'utilisateur sur cet appareil ?")){ localStorage.removeItem(CLE_IDENTITE); location.hash=""; location.reload(); } }

  function validate(){
    if(localStorage.getItem(sentKey(state.date))) return "Feuille déjà envoyée pour cette date.";
    if(state.statut==="travail"){
      if(heuresJournee()<=0) return "Renseignez au moins la matinée ou l'après-midi.";
      if((state.matineeDebut&&state.matineeFin&&dureeH(state.matineeDebut,state.matineeFin)<=0) ||
         (state.apremDebut&&state.apremFin&&dureeH(state.apremDebut,state.apremFin)<=0)) return "Une heure de fin est avant l'heure de début.";
    }
    return null;
  }
  function buildPayload(){
    const now=new Date();
    const envoyeHeure=now.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit",timeZone:CFG.timezone||"Europe/Paris"});
    const st=STATUTS.find(s=>s.id===state.statut), trav=state.statut==="travail", attendu=heuresAttenduesJour(state.date);
    const hj=heuresJournee(), ht=heuresTrajet();
    return { source:"app-hk", employeId:employe.id, employeNom:employe.nom, role:employe.role, date:state.date, ligneModele:ligneModele(state.date),
      jourSemaine:jourNom(state.date), statut:state.statut, statutLabel:st?st.label:state.statut,
      chantier:trav?state.chantier:"", trajetAllerDepart:(trav&&!estChauffeur)?state.trajetAllerDep:"",
      trajetAllerArrivee:(trav&&!estChauffeur)?state.trajetAllerArr:"", matineeDebut:trav?state.matineeDebut:"",
      matineeFin:trav?state.matineeFin:"", apresMidiDebut:trav?state.apremDebut:"", apresMidiFin:trav?state.apremFin:"",
      trajetRetourDepart:(trav&&!estChauffeur)?state.trajetRetourDep:"", trajetRetourArrivee:(trav&&!estChauffeur)?state.trajetRetourArr:"",
      pauseMidiHeures:trav?Math.round(pauseMidi()*100)/100:0, heuresJournee:Math.round(hj*100)/100,
      heuresTrajet:Math.round(ht*100)/100, heuresAttendues:attendu, heuresSupp:trav?Math.round((hj-attendu)*100)/100:0,
      commentaire:state.commentaire||"", envoyeLe:now.toISOString(), _envoyeHeure:envoyeHeure };
  }
  async function envoyer(){
    const err=validate(); if(err) return toast(err,true);
    const btn=document.getElementById("f-send"); btn.disabled=true; btn.textContent="Envoi…";
    const payload=buildPayload();
    try{
      if(!CFG.webhookUrl || CFG.webhookUrl.includes("REMPLACEZ")){ await new Promise(r=>setTimeout(r,450)); }
      else { const res=await fetch(CFG.webhookUrl,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)}); if(!res.ok) throw new Error("HTTP "+res.status); }
      localStorage.setItem(sentKey(state.date),JSON.stringify(payload)); if(window.HK_NOTIF) HK_NOTIF.markDone(state.date); toast("Feuille envoyée"); render();
    }catch(e){ btn.disabled=false; btn.textContent="Envoyer"; toast("Échec de l'envoi, réessayez.",true); }
  }

  let toastTimer;
  function toast(msg,isErr){ let t=document.querySelector(".toast"); if(!t){ t=document.createElement("div"); document.body.appendChild(t); }
    t.className="toast"+(isErr?" err":""); t.textContent=msg; clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.remove(),3200); }

  function demarrer(){
    if(who) who.innerHTML=`<div class="nom">${employe.nom}</div><div class="role">${employe.role==="chauffeur"?"Chauffeur":"Chantier"}</div>`;
    initState(); render();
    if(window.HK_NOTIF) HK_NOTIF.login(employe);
  }
  if(employe) demarrer(); else renderOnboarding();
})();
</script>
</body>
</html>
